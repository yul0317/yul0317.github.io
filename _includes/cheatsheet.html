<section id="cheatsheet" class="panel" aria-labelledby="cheatsheet-tab">
  <div class="cheat-sheet">
    <section class="cheat-selector-pane" aria-label="컨닝페이퍼 선택 영역">
      <div class="cheat-page-nav">
        <button type="button" id="cheatPrevPage" aria-label="이전 선택 페이지">이전</button>
        <strong id="cheatPageLabel">1 / 2</strong>
        <button type="button" id="cheatNextPage" aria-label="다음 선택 페이지">다음</button>
      </div>

      <div class="cheat-page-scroll">
        <div class="cheat-page active" data-cheat-page="1">
          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">그랜드크로스 1회차</div>
              <div class="cheat-buttons" data-cheat-key="gc1Truth">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
            <div class="cheat-row">
              <div class="cheat-subtitle">물/번개 <span class="cheat-alert" id="cheatGc1SpreadTarget">산개징: -</span></div>
              <div class="cheat-buttons" data-cheat-key="gc1Timing">
                <button type="button" data-value="빠른">빠른</button>
                <button type="button" data-value="느린">느린</button>
              </div>
            </div>
            <div class="cheat-row">
              <div class="cheat-subtitle">가속도 부여</div>
              <div class="cheat-buttons cheat-toggle-buttons" data-cheat-key="accelRound">
                <button type="button" data-value="1회차">1회차</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">그랜드크로스 2회차</div>
              <div class="cheat-buttons" data-cheat-key="gc2Truth">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
            <div class="cheat-row">
              <div class="cheat-subtitle">물/번개 <span class="cheat-alert" id="cheatGc2SpreadTarget">산개징: -</span></div>
              <div class="cheat-buttons locked" data-cheat-key="gc2Timing">
                <button type="button" data-value="빠른" disabled>빠른</button>
                <button type="button" data-value="느린" disabled>느린</button>
              </div>
            </div>
            <div class="cheat-row">
              <div class="cheat-subtitle">가속도 부여</div>
              <div class="cheat-buttons cheat-toggle-buttons" data-cheat-key="accelRound">
                <button type="button" data-value="2회차">2회차</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">카오스 1회차</div>
              <div class="cheat-buttons" data-cheat-key="chaos1Truth">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
            <div class="cheat-row">
              <div class="cheat-subtitle">디버프</div>
              <div class="cheat-buttons" data-cheat-key="chaos1Type">
                <button type="button" data-value="혼돈의 불">불</button>
                <button type="button" data-value="혼돈의 물">물</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">카오스 2회차</div>
              <div class="cheat-buttons" data-cheat-key="chaos2Truth">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
          </div>
        </div>

        <div class="cheat-page" data-cheat-page="2" hidden>
          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">썬더가(직선)</div>
              <div class="cheat-buttons" data-cheat-key="thunderMemory">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">블리자가(부채꼴)</div>
              <div class="cheat-buttons" data-cheat-key="blizzardMemory">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">마력방출 위</div>
              <div class="cheat-buttons" data-cheat-key="releaseTop">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
          </div>

          <div class="cheat-card">
            <div class="cheat-row">
              <div class="cheat-title">마력방출 밑</div>
              <div class="cheat-buttons" data-cheat-key="releaseBottom">
                <button type="button" data-value="진짜">진짜</button>
                <button type="button" data-value="가짜">가짜</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="cheat-result-pane" aria-label="컨닝페이퍼 결과 영역">
      <div class="cheat-result" id="cheatResult" aria-live="polite"></div>
    </section>
  </div>
</section>
