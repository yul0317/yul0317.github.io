---
---
<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <title>{{ site.title }}</title>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
  <!-- 기본 스타일 다음에 기능별 스타일과 반응형 스타일을 순서대로 불러옵니다. -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/guide.css">
  <link rel="stylesheet" href="assets/css/quiz.css">
  <link rel="stylesheet" href="assets/css/simulation.css">
  <link rel="stylesheet" href="assets/css/cheatsheet.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
  <div class="shell">
    <h1 class="visually-hidden">{{ site.title }}</h1>

    <header>
      <nav aria-label="페이지 탭">
        <div class="tabs">
          <button class="tab" type="button" aria-selected="true" data-tab="guide">설명</button>
          <button class="tab" type="button" aria-selected="false" data-tab="quiz">퀴즈</button>
          <button class="tab" type="button" aria-selected="false" data-tab="simulation">시뮬레이션</button>
          <button class="tab" type="button" aria-selected="false" data-tab="cheatsheet">컨닝페이퍼</button>
        </div>
      </nav>
    </header>

    <main>
      {% include guide.html %}
      {% include quiz.html %}
      {% include simulation.html %}
      {% include cheatsheet.html %}
    </main>
  </div>

  <!-- 공통 코드부터 기능 코드 순서로 불러오고 마지막에 이벤트를 연결합니다. -->
  <script src="assets/js/core.js"></script>
  <script src="assets/js/mechanics.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/cheatsheet.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/simulation.js"></script>
  <script src="assets/js/bootstrap.js"></script>
</body>

</html>
